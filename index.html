      let symbol = "";
      let value1 = "";
      let value2 = "";

      function clickequal() {
        console.log(tab.innerText);
        let inputValue = tab.innerText;
        let index = 0;
        for (let i = 0; i < inputValue.length; i++) {
          if (
            inputValue[i] == "+" ||
            inputValue[i] == "-" ||
            inputValue[i] == "/" ||
            inputValue[i] == "*"
          ) {
            symbol = inputValue[i];
            index = i;
          }
        }
        for (let i = 0; i < index; i++) {
          value1 += inputValue[i];
        }
        for (let i = index + 1; i < inputValue.length; i++) {
          value2 += inputValue[i];
        }
        console.log(symbol, value1, value2);

        let result;
        if (symbol == "+") {
          result = Number(value1) + Number(value2);
          tab.innerText = result;
        }
        if (symbol == "-") {
          result = Number(value1) - Number(value2);
          tab.innerText = result;
        }
        if (symbol == "/") {
          result = Number(value1) / Number(value2);
          tab.innerText = result;
        }

        if (symbol == "*") {
          result = Number(value1) * Number(value2);
          tab.innerText = result;
        }
        symbol = "";
        value1 = "";
        value2 = "";
        // let result = ` ${value1} + ${value2} = ${
